server:
  tomcat:
    threads:
      max: 200
      min-spare: 10

spring:
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.jdbc.DataSourceHealthContributorAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}
        namespace: ${NACOS_NAMESPACE:prod}
        group: DEFAULT_GROUP
        enabled: true
      config:
        enabled: false
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600
      routes:
        - id: access-openapi-route
          uri: lb://data-platform-access
          predicates:
            - Path=/openapi/**
        - id: masterdata-vendor-route
          uri: lb://data-platform-masterdata
          predicates:
            - Path=/api/v1/vendor/**,/api/v1/config/**,/api/v1/datatype/**,/api/v1/data/**
          filters:
            - StripPrefix=2
        - id: access-caller-route
          uri: lb://data-platform-access
          predicates:
            - Path=/api/v1/caller/**
          filters:
            - StripPrefix=2
        - id: access-openapi-docs-route
          uri: lb://data-platform-access
          predicates:
            - Path=/api/v1/openapi-docs/**
          filters:
            - StripPrefix=2
        - id: billing-management-route
          uri: lb://data-platform-billing
          predicates:
            - Path=/api/v1/billing/**
          filters:
            - StripPrefix=2
        - id: access-call-record-route
          uri: lb://data-platform-access
          predicates:
            - Path=/api/v1/call-record/**
          filters:
            - StripPrefix=2
        - id: access-call-scene-route
          uri: lb://data-platform-access
          predicates:
            - Path=/api/v1/call-scene/**
          filters:
            - StripPrefix=2
        - id: governance-alert-route
          uri: lb://data-platform-governance
          predicates:
            - Path=/api/v1/alert/**
          filters:
            - StripPrefix=2
        - id: identity-tenant-route
          uri: lb://data-platform-identity
          predicates:
            - Path=/api/v1/tenant/**
          filters:
            - StripPrefix=2
        - id: identity-iam-route
          uri: lb://data-platform-identity
          predicates:
            - Path=/api/v1/user/**,/api/v1/auth/**,/api/v1/role/**,/api/v1/permission/**
          filters:
            - StripPrefix=2
        - id: governance-log-route
          uri: lb://data-platform-governance
          predicates:
            - Path=/api/v1/log/**
          filters:
            - StripPrefix=2
        - id: masterdata-gray-route
          uri: lb://data-platform-masterdata
          predicates:
            - Path=/api/v1/graylog/**
          filters:
            - StripPrefix=2
        - id: identity-security-route
          uri: lb://data-platform-identity
          predicates:
            - Path=/api/v1/security/**
          filters:
            - StripPrefix=2
        - id: governance-trace-route
          uri: lb://data-platform-governance
          predicates:
            - Path=/api/v1/trace/**
          filters:
            - StripPrefix=2
        - id: governance-quality-route
          uri: lb://data-platform-governance
          predicates:
            - Path=/api/v1/quality/**
          filters:
            - StripPrefix=2
        - id: masterdata-interface-route
          uri: lb://data-platform-masterdata
          predicates:
            - Path=/api/v1/interface/**
          filters:
            - StripPrefix=2

sa-token:
  token-name: Authorization
  timeout: 7200
  is-concurrent: true
  is-share: false
  token-style: uuid
  check-exclude-paths:
    - /actuator/**
    - /health/**

spring.data.redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  password: ${REDIS_PASSWORD}
  database: 0

gateway:
  rate-limit:
    default-window-sec: ${GATEWAY_RATE_LIMIT_WINDOW_SEC:60}
    default-max-requests: ${GATEWAY_RATE_LIMIT_MAX_REQUESTS:100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    db:
      enabled: false
