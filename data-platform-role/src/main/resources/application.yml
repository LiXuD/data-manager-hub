server:
  port: 8088

spring:
  application:
    name: data-platform-role
  datasource:
    url: jdbc:postgresql://localhost:5432/dataplatform
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

nacos:
  discovery:
    enabled: false

logging:
  level:
    com.dataplatform: debug