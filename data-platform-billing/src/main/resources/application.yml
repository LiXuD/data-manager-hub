server:
  port: 8083

spring:
  application:
    name: data-platform-billing
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/dataplatform
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

spring.data.redis:
  host: localhost
  port: 6379
  password: redis_password
  database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.dataplatform.billing.entity

spring.cloud.nacos.config.import-check.enabled: false
