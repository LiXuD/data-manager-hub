server:
  port: 8081

spring:
  application:
    name: data-platform-vendor
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/dataplatform
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 10000
      max-lifetime: 600000

spring.data.redis:
  host: localhost
  port: 6379
  password: redis_password
  database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.dataplatform.vendor.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

spring.cloud.nacos.config.import-check.enabled: false
