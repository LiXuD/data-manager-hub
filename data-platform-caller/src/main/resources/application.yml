server:
  port: 8082

spring:
  application:
    name: data-platform-caller
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5342/dataplatform
    username: dpadmin
    password: dpadmin123
    driver-class-name: org.postgresql.Driver

spring.data.redis:
  host: localhost
  port: 6379
  password: redis_password
  database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.dataplatform.caller.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: true
