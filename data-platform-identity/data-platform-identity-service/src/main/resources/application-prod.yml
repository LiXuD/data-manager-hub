spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}
        namespace: ${NACOS_NAMESPACE:prod}
        group: DEFAULT_GROUP
        enabled: true
      config:
        enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 10000
      max-lifetime: 600000

spring.data.redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  password: ${REDIS_PASSWORD}
  database: 0

sa-token:
  token-name: Authorization
  timeout: 7200
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-read-header: true
  is-read-cookie: false
  token-prefix: Bearer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.dataplatform.identity.tenant.entity,com.dataplatform.identity.iam.entity,com.dataplatform.identity.security.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

logging:
  level:
    com.dataplatform.identity: INFO

platform:
  security:
    internal:
      enabled: true
      issuer: data-platform-identity
      service-name: data-platform-identity
      token-uri: ${INTERNAL_AUTH_TOKEN_URI}
      client-secret: ${INTERNAL_AUTH_IDENTITY_SECRET}
      public-key-location: file:${INTERNAL_AUTH_PUBLIC_KEY_PATH}
      private-key-location: file:${INTERNAL_AUTH_PRIVATE_KEY_PATH}
      token-ttl: 5m
      clients:
        data-platform-access:
          secret: ${INTERNAL_AUTH_ACCESS_SECRET}
          grants:
            data-platform-masterdata: [masterdata:read, masterdata:vendor-secret:read, masterdata:vendor-security:read]
            data-platform-billing: [billing:calculate]
            data-platform-governance: [governance:log]
        data-platform-billing:
          secret: ${INTERNAL_AUTH_BILLING_SECRET}
          grants:
            data-platform-masterdata: [masterdata:read]
            data-platform-access: [access:stats:read]
            data-platform-governance: [governance:alert, governance:log]
        data-platform-masterdata:
          secret: ${INTERNAL_AUTH_MASTERDATA_SECRET}
          grants:
            data-platform-access: [access:stats:read]
            data-platform-identity: [identity:encryption]
            data-platform-governance: [governance:log]
        data-platform-identity:
          secret: ${INTERNAL_AUTH_IDENTITY_SECRET}
          grants:
            data-platform-governance: [governance:log]
