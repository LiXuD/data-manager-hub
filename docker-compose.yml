# =====================================================
# 数据管理平台 - Docker Compose 配置
#
# 本文件仅用于本地开发/测试启动中间件 (PostgreSQL/Redis/Kafka/Nacos 等)，
# 不作为生产部署模板。生产环境必须使用独立的高可用中间件，
# 并通过环境变量或密钥系统提供密码。
# 五域 Java 服务通过 ./start-services.sh 以 mvn spring-boot:run 启动。
#
# 五域服务:
#   masterdata (8081), access (8082), billing (8084),
#   governance (8085), identity (8086), gateway (8888)
#
# 启动命令: docker-compose up -d
# 停止命令: docker-compose down
# 查看日志: docker-compose logs -f [服务名]
# =====================================================

services:
  # PostgreSQL 主数据库
  postgres:
    image: postgres:16-alpine
    container_name: data-platform-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dataplatform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-postgres}\" -d \"$${POSTGRES_DB:-dataplatform}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: data-platform-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-redis_password}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Kafka 消息队列
  kafka:
    image: apache/kafka:3.7.0
    container_name: data-platform-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data

  # Nacos 服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v2.3.2
    platform: linux/amd64
    container_name: data-platform-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_logs:/home/nacos/logs
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: data-platform-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana 可视化
  grafana:
    image: grafana/grafana:11.0.0
    container_name: data-platform-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Elasticsearch 日志存储
  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: data-platform-elasticsearch
    environment:
      - discovery.type=single-node
      # Local/test only. Use authenticated TLS-enabled Elasticsearch in production.
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # Kibana 日志可视化
  kibana:
    image: kibana:8.15.0
    container_name: data-platform-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  # Filebeat 日志收集
  filebeat:
    image: elastic/filebeat:8.15.0
    container_name: data-platform-filebeat
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml
      - /var/log/data-platform:/var/log/data-platform
    depends_on:
      - elasticsearch

  # SkyWalking OAP 链路追踪服务端
  skywalking-oap:
    image: apache/skywalking-oap-server:9.4.0
    container_name: data-platform-skywalking-oap
    environment:
      SW_STORAGE: h2
      # Local/test only. Configure persistent storage such as Elasticsearch in production.
      SW_STORAGE_H2_URL: "jdbc:h2:mem:skywalking-oap-db"
      SW_CORE_REST_PORT: 12800
      SW_CORE_GRPC_PORT: 11800
    ports:
      - "11800:11800"
      - "12800:12800"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12800/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # SkyWalking UI 链路追踪可视化
  skywalking-ui:
    image: apache/skywalking-ui:9.4.0
    container_name: data-platform-skywalking-ui
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - "8088:8080"
    depends_on:
      - skywalking-oap

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  nacos_logs:
  nacos_data:
  prometheus_data:
  grafana_data:
  es_data:
