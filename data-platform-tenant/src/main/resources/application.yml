server:
  port: 8086

spring:
  application:
    name: data-platform-tenant
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5342/dataplatform
    username: dpadmin
    password: dpadmin123
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_password

mybatis-plus:
