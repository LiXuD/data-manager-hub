server:
  port: 8095

spring:
  application:
    name: data-platform-trace
  datasource:
    url: jdbc:postgresql://localhost:5432/dataplatform
    username: postgres
    password: "123456"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 10000
      max-lifetime: 600000
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_password

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0